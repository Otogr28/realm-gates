site_name: Realm Gates
site_description: Player guide for the Realm Gates Minecraft modpack (Forge 1.20.1)
site_author: Realm Gates
site_url: https://otogr28.github.io/realm-gates/
repo_url: https://github.com/Otogr28/realm-gates
repo_name: Otogr28/realm-gates
docs_dir: docs

# GitHub Pages is static hosting with no server-side auth, so the password-gated
# /private/ section can't be protected there — exclude it from the published site.
# (It still exists in the repo for the optional self-hosted Caddy deploy.)
exclude_docs: |
  private/

theme:
  name: material
  language: en
  palette:
    - scheme: summerbuddies
  font:
    text: Hanken Grotesk
    code: JetBrains Mono
  icon:
    logo: material/compass-rose
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/realm-gates.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

# Keep the password-protected /private/ pages out of the nav without failing --strict builds.
validation:
  nav:
    omitted_files: ignore
  not_found: warn

extra:
  generator: false

nav:
  - Home: index.md
  - Dimensions:
      - Overview: mods/index.md
      - All mods: mods/all-dimensions.md
      - Dimension 1 — Aincrad: mods/dimension-1.md
      - Dimension 2 (soon): mods/dimension-2.md
      - Dimension 3 (soon): mods/dimension-3.md
  - Getting started:
      - getting-started/index.md
      - Install the modpack: getting-started/install.md
      - Voice & chat translation: getting-started/voice-and-chat.md
      - Updating: getting-started/updating.md
  - Concepts explained: concepts.md
  - Custom features:
      - Realm Gates: custom/realmgates.md
      - Custom Companions: custom/custom-companions.md
      - Voice Translate: custom/voice-translate.md
  - Server info: server-info.md
