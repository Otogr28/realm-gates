site_name: summerBuddies Wiki
site_description: Player guide for the summerBuddies Minecraft modpack (Forge 1.20.1)
site_author: summerBuddies
# site_url is set once you have a domain, e.g. https://wiki.example.com
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - scheme: summerbuddies
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/compass-rose
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

# Keep the password-protected /private/ pages out of the nav without failing --strict builds.
validation:
  nav:
    omitted_files: ignore
  not_found: warn

extra:
  generator: false

nav:
  - Home: index.md
  - Getting started:
      - Install the modpack: getting-started/install.md
      - Voice & chat translation: getting-started/voice-and-chat.md
      - Updating: getting-started/updating.md
  - Concepts explained: concepts.md
  - The mods:
      - How the mod list works: mods/index.md
      - Quality of life: mods/quality-of-life.md
      - Early game: mods/early-game.md
      - Mid game: mods/mid-game.md
      - Endgame: mods/endgame.md
  - Custom features:
      - Realm Gates: custom/realmgates.md
      - Custom Companions: custom/custom-companions.md
      - Voice Translate: custom/voice-translate.md
  - Server info: server-info.md
