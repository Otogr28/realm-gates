# ============================================================
#  Realm Gates — mod catalogue (single source of truth)
# ============================================================
#  Every mod in the pack is an OBJECT here. The wiki renders its
#  cards/badges from this data (via the mod_card macro in main.py),
#  so there is NO hand-written "Aincrad" pill in the markdown anymore.
#
#  To assign a mod to a dimension, set its `dimension:` to one of the
#  keys under `dimensions:` below (e.g. `dimension: aincrad`).
#  Leave it OUT (or `dimension: ~`) and the mod shows the neutral
#  "Unassigned" badge — it will NOT default to Aincrad.
#
#  Fields per mod:
#    name       display title (shown on the card)
#    desc       one-line blurb
#    dimension  key from `dimensions:` below, or omit for unassigned
#    img        artwork under docs/assets/...  (omit for emoji/blank)
#    emoji      fallback glyph when there is no img (e.g. "⚰️")
#    media      extra media classes: "icon" (square logo) | "empty"
#    href       internal page slug (e.g. "oh-the-biomes-weve-gone")
#    url        external link (Modrinth/CurseForge) — used on the home teaser
#    cta        link label ("Details →" | "Mod page ↗" | "Open →")
# ============================================================

# --- Dimensions (the assignable tags) -----------------------
#  `badge`   text shown in the pill
#  `variant` CSS modifier: "" (solid gold) | "all" | "soon"
dimensions:
  aincrad:
    badge: Aincrad
    variant: ""
    # Hero/cover artwork for the realm (path under docs/assets/...).
    # Used by the Aincrad banner (mods/dimension-1.md) and the home card.
    image: assets/mods/aincrad-banner.webp
  all:
    badge: All dimensions
    variant: all
  # Dimension 2 & 3 exist as realms but have no mods assigned yet.
  dim2:
    badge: Dimension 2
    variant: soon
  dim3:
    badge: Dimension 3
    variant: soon

# Badge used when a mod has no `dimension` assigned yet.
# (Replaces the old hard-coded "Aincrad" default.)
unassigned:
  badge: Unassigned
  variant: unassigned

